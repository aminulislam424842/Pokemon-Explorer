<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Meta Information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Pokemon Explorer</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <!-- ================= Header ================= -->
        <header>

            <!-- Navigation Bar -->
            <nav>

                <!-- Menu Button -->
                <button class="menu-btn">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <!-- Pokemon Logo -->
                <img class="logo" src="Pokemon.png" alt="Pokemon Logo">

                <!-- Theme Button -->
                <button class="theme-btn">
                    <i class="fa-regular fa-sun"></i>
                </button>

            </nav>

        </header>

        <!-- ================= Main Content ================= -->
        <main>

            <!-- Search Section -->
            <section class="search-section">

                <!-- Search Box -->
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="search" placeholder="Search for a Pokémon...">
                </div>

                <!-- Filter Button -->
                <button class="filter-btn">
                    Filter by types (1)
                    <i class="fa-solid fa-angle-down"></i>
                </button>

            </section>

            <!-- Pokemon Cards -->
            <section class="card-container">

                <!-- Card 1 -->
                <div class="card">

                    <!-- Card Header -->
                    <div class="card-top">
                        <p>#0908</p>

                        <button class="favorite-btn">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>

                    <!-- Pokemon Image -->
                    <div class="pokemon-image">
                        <p>image</p>
                    </div>

                    <!-- Card Content -->
                    <div class="card-content">

                        <h2>Meowscarada</h2>

                        <!-- Card Footer -->
                        <div class="card-footer">

                            <span class="type Grass">
                                Grass
                            </span>

                            <button class="arrow-btn">
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>

                        </div>

                    </div>

                </div>

                <!-- Card 2 -->
                <div class="card">

                    <div class="card-top">
                        <p>#0624</p>

                        <button class="favorite-btn">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>

                    <div class="pokemon-image">
                        <p>image</p>
                    </div>

                    <div class="card-content">

                        <h2>Pawniard</h2>

                        <div class="card-footer">

                            <span class="type steel">
                                DARK / STEEL
                            </span>

                            <button class="arrow-btn">
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>

                        </div>

                    </div>

                </div>

                <!-- Card 3 -->
                <div class="card">

                    <div class="card-top">
                        <p>#0686</p>

                        <button class="favorite-btn">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>

                    <div class="pokemon-image">
                        <p>image</p>
                    </div>

                    <div class="card-content">

                        <h2>Inkay</h2>

                        <div class="card-footer">

                            <span class="type psychic">
                                DARK / PSYCHIC
                            </span>

                            <button class="arrow-btn">
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>

                        </div>

                    </div>

                </div>

                <!-- Card 4 -->
                <div class="card">

                    <div class="card-top">
                        <p>#0229</p>

                        <button class="favorite-btn">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>

                    <div class="pokemon-image">
                        <p>image</p>
                    </div>

                    <div class="card-content">

                        <h2>Houndoom</h2>

                        <div class="card-footer">

                            <span class="type fire">
                                DARK / FIRE
                            </span>

                            <button class="arrow-btn">
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>

                        </div>

                    </div>

                </div>

            </section>

            

        </main>

        <!-- ================= Footer ================= -->
        

    </div>

</body>

</html>
